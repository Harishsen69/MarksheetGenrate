<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .sub_div{
      border:2px solid red;
      width:300px;
      text-align: center;
    }
    #students{
      display: flex;
      flex-wrap: wrap;
      justify-content: space-evenly;
    }
  </style>
</head>
<body>
  <div id="students">

  </div>
</body>
<script>
  let Users=JSON.parse(localStorage.getItem('student'))||[]
  document.getElementById('students').innerHTML=
  Users.map(i=>(
    `<div class='sub_div'>
      <h2>${i.name}</h2>
      <p>${i.email}</p>
      <p>${i.address}</p>
    </div>`
  )).join("")
</script>
</html>
